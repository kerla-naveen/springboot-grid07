spring:
  application:
    name: grid
  datasource:
    url: jdbc:postgresql://localhost:5432/grid_db
    username: grid_user
    password: password
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
