services:
  postgres:
    image: postgres:15
    container_name: grid_postgres
    environment:
      POSTGRES_DB: grid_db
      POSTGRES_USER: grid_user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: grid_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
